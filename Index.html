<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Digital - Solo Nombres</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #051F20;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    #interfaz-lista {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 { 
      color: #00FFFF; 
      font-size: 1.5rem; 
      text-transform: uppercase;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    .grid-canales {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
      width: 100%;
      max-width: 800px;
    }

    .canal-card {
      background: #0a2d2e;
      border: 1px solid rgba(0, 255, 255, 0.4);
      border-radius: 6px;
      padding: 20px 10px; /* Espaciado para compensar la falta de imagen */
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
    }

    .canal-card:hover {
      border-color: #00FFFF;
      background: rgba(0, 255, 255, 0.15);
      transform: scale(1.02);
    }

    .canal-nombre { 
      color: #00FFFF; 
      font-weight: 600; 
      font-size: 1rem;
      text-transform: uppercase;
    }

    /* Contenedor del reproductor */
    #contenedor-reproductor {
      display: none;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      background: #000;
      z-index: 1000;
    }

    #player { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div id="interfaz-lista">
    <h1>Canales</h1>
    <div class="grid-canales" id="contenedorCanales"></div>
  </div>

  <div id="contenedor-reproductor">
    <div id="player"></div>
  </div>

  <script src="https://ssl.p.jwpcdn.com/player/v/8.21.1/jwplayer.js"></script>

  <script>
    const canales = [
      {
        nombre: "TyC Sports",
        url: "https://cdn03.gigared.com.ar/live/eds/TyC_Sports/sa_live_dash/TyC_Sports.mpd",
        keyId: "cac7b52cb14661fe3db0449020791d97",
        key: "0c2780acce4ef9d7334ef25be445ceb4"
      }
      // Para agregar más, solo copia el bloque anterior aquí abajo
    ];

    function cargarCanales() {
      const contenedor = document.getElementById('contenedorCanales');
      canales.forEach(canal => {
        const card = document.createElement('div');
        card.className = 'canal-card';
        card.onclick = () => abrirCanal(canal);
        card.innerHTML = `<div class="canal-nombre">${canal.nombre}</div>`;
        contenedor.appendChild(card);
      });
    }

    function abrirCanal(canal) {
      document.getElementById('interfaz-lista').style.display = 'none';
      document.getElementById('contenedor-reproductor').style.display = 'block';

      jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';
      jwplayer("player").setup({
        playlist: [{
          title: canal.nombre,
          sources: [{
            file: canal.url,
            type: "dash",
            drm: { clearkey: { keyId: canal.keyId, key: canal.key } }
          }]
        }],
        width: "100%",
        height: "100%",
        autostart: true,
        stretching: "uniform"
      });

      // Registro en el historial para permitir volver atrás
      window.history.pushState({view: 'player'}, canal.nombre);
    }

    // Al apretar el botón de atrás (celular o control remoto)
    window.onpopstate = function(event) {
      if (jwplayer("player")) {
        jwplayer("player").remove(); 
      }
      document.getElementById('interfaz-lista').style.display = 'flex';
      document.getElementById('contenedor-reproductor').style.display = 'none';
    };

    window.onload = cargarCanales;
  </script>
</body>
</html>
