<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Digital - GitHub Pages</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-color: #00FFFF;
      --bg-dark: #051F20;
      --card-bg: #0a2d2e;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }

    #interfaz-lista {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 { 
      font-family: 'Orbitron', sans-serif;
      color: var(--primary-color); 
      font-size: 1.8rem; 
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    /* Buscador */
    #buscador {
      width: 100%;
      max-width: 400px;
      padding: 12px;
      margin-bottom: 30px;
      background: rgba(10, 45, 46, 0.8);
      border: 1px solid var(--primary-color);
      border-radius: 25px;
      color: white;
      text-align: center;
      outline: none;
    }

    .grid-canales {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      width: 100%;
      max-width: 900px;
    }

    .canal-card {
      background: var(--card-bg);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 10px;
      padding: 25px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .canal-card:hover {
      border-color: var(--primary-color);
      background: rgba(0, 255, 255, 0.1);
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0, 255, 255, 0.2);
    }

    .canal-nombre { 
      color: var(--primary-color); 
      font-weight: bold; 
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Icono de TV (Simulado) */
    .tv-icon {
        font-size: 24px;
        margin-bottom: 5px;
    }

    /* Contenedor del reproductor */
    #contenedor-reproductor {
      display: none;
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      background: #000;
      z-index: 1000;
    }

    #btn-cerrar {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 0, 0, 0.6);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      z-index: 1001;
      font-weight: bold;
    }

    #player { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div id="interfaz-lista">
    <h1>TV DIGITAL</h1>
    <input type="text" id="buscador" placeholder="Buscar canal..." onkeyup="filtrarCanales()">
    <div class="grid-canales" id="contenedorCanales"></div>
  </div>

  <div id="contenedor-reproductor">
    <button id="btn-cerrar" onclick="cerrarReproductor()">✕ CERRAR</button>
    <div id="player"></div>
  </div>

  <script src="https://ssl.p.jwpcdn.com/player/v/8.21.1/jwplayer.js"></script>

  <script>
    // LISTA DE CANALES
    const canales = [
      {
        nombre: "TyC Sports",
        url: "https://cdn03.gigared.com.ar/live/eds/TyC_Sports/sa_live_dash/TyC_Sports.mpd",
        keyId: "cac7b52cb14661fe3db0449020791d97",
        key: "0c2780acce4ef9d7334ef25be445ceb4"
      },
      {
        nombre: "Canal 2 (Ejemplo)",
        url: "URL_AQUI",
        keyId: "KEY_ID_AQUI",
        key: "KEY_AQUI"
      }
    ];

    function cargarCanales(lista) {
      const contenedor = document.getElementById('contenedorCanales');
      contenedor.innerHTML = ''; // Limpiar
      lista.forEach(canal => {
        const card = document.createElement('div');
        card.className = 'canal-card';
        card.onclick = () => abrirCanal(canal);
        card.innerHTML = `
          <div class="tv-icon">📺</div>
          <div class="canal-nombre">${canal.nombre}</div>
        `;
        contenedor.appendChild(card);
      });
    }

    function filtrarCanales() {
      const texto = document.getElementById('buscador').value.toLowerCase();
      const filtrados = canales.filter(c => c.nombre.toLowerCase().includes(texto));
      cargarCanales(filtrados);
    }

    function abrirCanal(canal) {
      document.body.style.overflow = 'hidden'; // Bloquear scroll
      document.getElementById('contenedor-reproductor').style.display = 'block';

      jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';
      const setup = {
        playlist: [{
          title: canal.nombre,
          sources: [{
            file: canal.url,
            type: "dash",
            drm: { clearkey: { keyId: canal.keyId, key: canal.key } }
          }]
        }],
        width: "100%",
        height: "100%",
        autostart: true,
        stretching: "uniform"
      };

      jwplayer("player").setup(setup);
      
      // Historial para el botón "atrás" del móvil
      window.history.pushState({view: 'player'}, canal.nombre);
    }

    function cerrarReproductor() {
        if (jwplayer("player")) { jwplayer("player").remove(); }
        document.getElementById('contenedor-reproductor').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // Manejo del botón atrás
    window.onpopstate = function(event) {
      cerrarReproductor();
    };

    window.onload = () => cargarCanales(canales);
  </script>
</body>
</html>
