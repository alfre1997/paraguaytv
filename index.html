<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Canales M3U8</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: black; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        #mainContainer { display: flex; flex-direction: column; height: 100%; }
        #channel-list { overflow-y: auto; padding: 10px; background-color: rgba(0, 0, 0, 0.7); flex-grow: 1; }
        .channel-item { padding: 12px; cursor: pointer; transition: background 0.3s; border-bottom: 1px solid #222; }
        .channel-item:hover, .channel-item:focus { background-color: rgba(255, 0, 0, 0.3); outline: none; }
        #search-bar { margin: 10px; background: #222; color: white; border: 1px solid #444; }
        #search-bar:focus { background: #333; color: white; border-color: red; box-shadow: none; }
        .loading { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>

    <div id="mainContainer">
        <input type="text" id="search-bar" class="form-control" placeholder="Buscar canal...">
        <div id="loading" class="loading">Cargando canales...</div>
        <aside id="channel-list" tabindex="0"></aside>
    </div>

    <script>
        const channelList = document.getElementById('channel-list');
        const searchBar = document.getElementById('search-bar');
        const loading = document.getElementById('loading');
        let channels = []; 
        let currentChannelIndex = 0;

        async function fetchPlaylist() {
            // Usamos un proxy para evitar errores de CORS en GitHub Pages
            const proxy = "https://api.allorigins.win/raw?url=";
            const target = "https://magma.alwaysdata.net/budtv/tvmagmanew/api.php";
            
            try {
                const response = await fetch(proxy + encodeURIComponent(target));
                if (!response.ok) throw new Error('Error en la red');
                const data = await response.text();
                loading.style.display = 'none';
                parseM3U(data);
            } catch (e) {
                loading.textContent = "Error al cargar la lista. Verifica la fuente.";
                console.error('Error fetching playlist:', e);
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            channels = [];
            
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    const name = lines[i].split(',')[1]?.trim() || "Canal sin nombre";
                    const url = lines[i + 1]?.trim();
                    if (url && url.startsWith('http')) {
                        channels.push({ name, url });
                    }
                }
            }
            renderList(channels);
        }

        function renderList(channelsToDisplay) {
            channelList.innerHTML = '';
            channelsToDisplay.forEach((channel, index) => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.textContent = channel.name;
                div.tabIndex = 0;
                div.onclick = () => window.open(channel.url, '_blank');
                div.onmouseover = () => currentChannelIndex = index;
                channelList.appendChild(div);
            });
        }

        searchBar.addEventListener('input', () => {
            const term = searchBar.value.toLowerCase();
            const filtered = channels.filter(c => c.name.toLowerCase().includes(term));
            renderList(filtered);
        });

        fetchPlaylist();
    </script>
</body>
</html>
