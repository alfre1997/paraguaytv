<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Digital - Lanzador</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-color: #00FFFF;
      --bg-dark: #051F20;
      --card-bg: #0a2d2e;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }

    #interfaz-lista {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 { 
      font-family: 'Orbitron', sans-serif;
      color: var(--primary-color); 
      font-size: 1.8rem; 
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    p { color: #888; margin-bottom: 25px; font-size: 0.9rem; }

    #buscador {
      width: 100%;
      max-width: 400px;
      padding: 12px;
      margin-bottom: 30px;
      background: rgba(10, 45, 46, 0.8);
      border: 1px solid var(--primary-color);
      border-radius: 25px;
      color: white;
      text-align: center;
      outline: none;
    }

    .grid-canales {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      width: 100%;
      max-width: 900px;
    }

    .canal-card {
      background: var(--card-bg);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 10px;
      padding: 25px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-decoration: none; /* Quitar subrayado de link */
    }

    .canal-card:hover {
      border-color: var(--primary-color);
      background: rgba(0, 255, 255, 0.15);
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
    }

    .canal-nombre { 
      color: var(--primary-color); 
      font-weight: bold; 
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .tv-icon { font-size: 24px; }
  </style>
</head>
<body>

  <div id="interfaz-lista">
    <h1>TV DIGITAL</h1>
    <p>Los canales se abrirán en una pestaña nueva</p>
    
    <input type="text" id="buscador" placeholder="Buscar canal..." onkeyup="filtrarCanales()">
    
    <div class="grid-canales" id="contenedorCanales"></div>
  </div>

  <script>
    // LISTA DE CANALES
    const canales = [
      {
        nombre: "TyC Sports",
        url: "https://cdn03.gigared.com.ar/live/eds/TyC_Sports/sa_live_dash/TyC_Sports.mpd"
      },
      {
        nombre: "ESPN Premium",
        url: "https://cableparatodos-soextensioonnennbe.blogspot.com/p/repro-floootoods-2.html?get=Rm94X1Nwb3J0c19QcmVtaXVuX0hE&lang=1"
      }
    ];

    function cargarCanales(lista) {
      const contenedor = document.getElementById('contenedorCanales');
      contenedor.innerHTML = '';
      
      lista.forEach(canal => {
        // Creamos un elemento 'a' para que funcione como link nativo
        const card = document.createElement('a');
        card.className = 'canal-card';
        card.href = canal.url;
        card.target = "_blank"; // ESTA ES LA CLAVE: Abre en pestaña nueva
        card.rel = "noopener noreferrer"; // Seguridad básica
        
        card.innerHTML = `
          <div class="tv-icon">📺</div>
          <div class="canal-nombre">${canal.nombre}</div>
        `;
        
        contenedor.appendChild(card);
      });
    }

    function filtrarCanales() {
      const texto = document.getElementById('buscador').value.toLowerCase();
      const filtrados = canales.filter(c => c.nombre.toLowerCase().includes(texto));
      cargarCanales(filtrados);
    }

    // Inicializar la carga
    window.onload = () => cargarCanales(canales);
  </script>
</body>
</html>
