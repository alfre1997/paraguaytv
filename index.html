<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Digital - Mi Lista</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-color: #00FFFF;
      --bg-dark: #051F20;
      --card-bg: #0a2d2e;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    #interfaz-lista {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 { 
      font-family: 'Orbitron', sans-serif;
      color: var(--primary-color); 
      font-size: 1.8rem; 
      text-transform: uppercase;
      margin-bottom: 25px;
      letter-spacing: 2px;
    }

    #buscador {
      width: 100%;
      max-width: 400px;
      padding: 12px;
      margin-bottom: 30px;
      background: rgba(10, 45, 46, 0.8);
      border: 1px solid var(--primary-color);
      border-radius: 25px;
      color: white;
      text-align: center;
      outline: none;
    }

    .grid-canales {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      width: 100%;
      max-width: 900px;
    }

    .canal-card {
      background: var(--card-bg);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 10px;
      padding: 25px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .canal-card:hover {
      border-color: var(--primary-color);
      background: rgba(0, 255, 255, 0.15);
      transform: translateY(-5px);
    }

    .canal-nombre { 
      color: var(--primary-color); 
      font-weight: bold; 
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    /* Contenedor del reproductor a pantalla completa */
    #contenedor-reproductor {
      display: none;
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      background: #000;
      z-index: 1000;
    }

    #player { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div id="interfaz-lista">
    <h1>TV DIGITAL</h1>
    <input type="text" id="buscador" placeholder="Buscar canal..." onkeyup="filtrarCanales()">
    <div class="grid-canales" id="contenedorCanales"></div>
  </div>

  <div id="contenedor-reproductor">
    <div id="player"></div>
  </div>

  <script src="https://ssl.p.jwpcdn.com/player/v/8.21.1/jwplayer.js"></script>

  <script>
    const canales = [
      {
        nombre: "TyC Sports",
        url: "https://cdn03.gigared.com.ar/live/eds/TyC_Sports/sa_live_dash/TyC_Sports.mpd",
        keyId: "cac7b52cb14661fe3db0449020791d97",
        key: "0c2780acce4ef9d7334ef25be445ceb4",
        metodo: "interno"
      },
      {
        nombre: "ESPN Premium",
        url: "https://cableparatodos-soextensioonnennbe.blogspot.com/p/repro-floootoods-2.html?get=Rm94X1Nwb3J0c19QcmVtaXVuX0hE&lang=1",
        metodo: "externo"
      }
    ];

    function cargarCanales(lista) {
      const contenedor = document.getElementById('contenedorCanales');
      contenedor.innerHTML = '';
      lista.forEach(canal => {
        const card = document.createElement('div');
        card.className = 'canal-card';
        card.onclick = () => abrirCanal(canal);
        card.innerHTML = `<div class="canal-nombre">${canal.nombre}</div>`;
        contenedor.appendChild(card);
      });
    }

    function filtrarCanales() {
      const texto = document.getElementById('buscador').value.toLowerCase();
      const filtrados = canales.filter(c => c.nombre.toLowerCase().includes(texto));
      cargarCanales(filtrados);
    }

    function abrirCanal(canal) {
      if (canal.metodo === "externo") {
        window.open(canal.url, '_blank');
      } else {
        document.getElementById('interfaz-lista').style.display = 'none';
        document.getElementById('contenedor-reproductor').style.display = 'block';

        jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';
        jwplayer("player").setup({
          playlist: [{
            title: canal.nombre,
            sources: [{
              file: canal.url,
              type: "dash",
              drm: { clearkey: { keyId: canal.keyId, key: canal.key } }
            }]
          }],
          width: "100%",
          height: "100%",
          autostart: true
        });
        
        // Push state permite que el botón "atrás" del navegador cierre el player
        window.history.pushState({view: 'player'}, canal.nombre);
      }
    }

    function cerrarReproductor() {
      if (jwplayer("player")) { jwplayer("player").remove(); }
      document.getElementById('interfaz-lista').style.display = 'flex';
      document.getElementById('contenedor-reproductor').style.display = 'none';
    }

    // Escuchar el botón atrás para volver a la lista
    window.onpopstate = function() {
      cerrarReproductor();
    };

    window.onload = () => cargarCanales(canales);
  </script>
</body>
</html>
