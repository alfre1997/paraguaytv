<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Canales M3U8</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0e0e0e; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        #mainContainer { display: flex; flex-direction: column; height: 100vh; }
        #channel-list { overflow-y: auto; padding: 10px; flex-grow: 1; background: #161616; }
        .channel-item { 
            padding: 15px; 
            cursor: pointer; 
            border-bottom: 1px solid #222; 
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .channel-item:hover { background: #ff000044; }
        .channel-item:focus { outline: none; background: #ff000066; }
        #search-bar { 
            margin: 15px; 
            background: #222; 
            border: 1px solid #444; 
            color: white; 
            padding: 12px;
        }
        .status-msg { text-align: center; padding: 20px; color: #aaa; font-style: italic; }
        .badge-live { background: red; font-size: 10px; padding: 3px 6px; border-radius: 4px; margin-right: 10px; }
    </style>
</head>
<body>

<div id="mainContainer">
    <input type="text" id="search-bar" class="form-control" placeholder="🔍 Buscar canal por nombre...">
    <div id="status" class="status-msg">Iniciando carga de canales...</div>
    <aside id="channel-list"></aside>
</div>

<script>
    const channelList = document.getElementById('channel-list');
    const searchBar = document.getElementById('search-bar');
    const statusMsg = document.getElementById('status');
    let allChannels = [];

    // 1. Intentamos cargar tu lista usando un proxy para evitar bloqueo CORS
    async function loadPlaylist() {
        const targetUrl = 'https://magma.alwaysdata.net/budtv/tvmagmanew/api.php';
        // Usamos allorigins.win que es un proxy gratuito y estable para GitHub Pages
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

        try {
            statusMsg.textContent = "Conectando con el servidor...";
            const response = await fetch(proxyUrl);
            
            if (!response.ok) throw new Error("Error en respuesta");
            
            const data = await response.json();
            const content = data.contents; // El contenido real de la lista

            if (!content || content.trim() === "") {
                throw new Error("Lista vacía");
            }

            parseM3U(content);
            statusMsg.style.display = 'none';
        } catch (error) {
            console.error(error);
            statusMsg.innerHTML = "❌ Error al cargar la lista original.<br><small>Probando lista de respaldo...</small>";
            // Si falla, cargamos una lista de prueba para verificar que el código funciona
            loadBackup();
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        allChannels = [];
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                // Extraer nombre del canal
                const nameMatch = line.match(/,(.*)$/);
                const name = nameMatch ? nameMatch[1].trim() : "Canal Desconocido";
                
                // Buscar la URL en la siguiente línea
                let url = "";
                if (lines[i+1] && lines[i+1].startsWith('http')) {
                    url = lines[i+1].trim();
                }

                if (url) {
                    allChannels.push({ name, url });
                }
            }
        }
        renderChannels(allChannels);
    }

    function renderChannels(list) {
        channelList.innerHTML = '';
        if (list.length === 0) {
            channelList.innerHTML = '<div class="status-msg">No se encontraron canales.</div>';
            return;
        }

        list.forEach(channel => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.tabIndex = 0;
            div.innerHTML = `<span class="badge-live">LIVE</span> ${channel.name}`;
            
            div.onclick = () => window.open(channel.url, '_blank');
            
            // Soporte para teclado (Enter)
            div.onkeydown = (e) => {
                if (e.key === 'Enter') window.open(channel.url, '_blank');
            };

            channelList.appendChild(div);
        });
    }

    // Buscador en tiempo real
    searchBar.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allChannels.filter(c => c.name.toLowerCase().includes(term));
        renderChannels(filtered);
    });

    // Lista de respaldo por si tu servidor falla
    function loadBackup() {
        const sampleM3U = `#EXTM3U
#EXTINF:-1,Canal de Prueba 1
https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8
#EXTINF:-1,Canal de Prueba 2
https://bitdash-a.akamaihd.net/content/MI201109210084_1/m3u8s/f08e80da-bf1d-4e3d-8899-f0f6155f6efa.m3u8`;
        parseM3U(sampleM3U);
        statusMsg.innerHTML = "⚠️ Usando lista de respaldo (Servidor original no responde)";
    }

    loadPlaylist();
</script>

</body>
</html>
