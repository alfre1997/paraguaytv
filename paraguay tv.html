<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Player - GitHub Pages</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #efefef; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; }
        .header-search { padding: 15px; background: #111; border-bottom: 2px solid #ff0000; position: sticky; top: 0; z-index: 100; }
        #search-bar { background: #222; border: 1px solid #444; color: white; border-radius: 8px; padding: 12px; }
        #search-bar:focus { box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); border-color: red; }
        #channel-list { overflow-y: auto; flex-grow: 1; padding: 10px; }
        .channel-card { 
            background: #1a1a1a; 
            margin-bottom: 8px; 
            padding: 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.3s;
            border-left: 4px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .channel-card:hover { background: #252525; border-left-color: red; transform: translateX(5px); }
        .status-info { text-align: center; margin-top: 50px; color: #888; }
        .btn-play { background: red; color: white; border: none; padding: 5px 15px; border-radius: 5px; font-weight: bold; }
        .loader { width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: #FF3D00; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header-search">
        <input type="text" id="search-bar" class="form-control" placeholder="🔍 Buscar canal por nombre...">
    </div>

    <div id="status" class="status-info">
        <span class="loader"></span>
        <p>Obteniendo lista de canales...</p>
    </div>

    <div id="channel-list"></div>

    <script>
        const listContainer = document.getElementById('channel-list');
        const searchInput = document.getElementById('search-bar');
        const statusDiv = document.getElementById('status');
        let allChannels = [];

        // Función para cargar la lista con bypass de CORS
        async function loadData() {
            const apiURL = 'https://magma.alwaysdata.net/budtv/tvmagmanew/api.php';
            // Usamos un proxy para que GitHub no bloquee la petición
            const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(apiURL);

            try {
                const response = await fetch(proxy);
                if (!response.ok) throw new Error('Error de conexión');
                
                const json = await response.json();
                const m3uContent = json.contents; // Extraemos el texto de la lista

                if (!m3uContent) throw new Error('La lista está vacía');

                parseM3U(m3uContent);
            } catch (error) {
                statusDiv.innerHTML = `<p style="color:red">❌ Error: No se pudo cargar la lista.<br>Intenta refrescar la página.</p>`;
                console.error(error);
            }
        }

        // Procesador de formato M3U
        function parseM3U(content) {
            const lines = content.split('\n');
            allChannels = [];

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    // Extraer nombre después de la coma
                    const name = lines[i].split(',')[1]?.trim() || "Canal Desconocido";
                    // La URL suele ser la siguiente línea que empieza con http
                    const url = lines[i+1]?.trim();

                    if (url && url.startsWith('http')) {
                        allChannels.push({ name, url });
                    }
                }
            }
            statusDiv.style.display = 'none';
            displayChannels(allChannels);
        }

        // Renderizado en pantalla
        function displayChannels(channels) {
            listContainer.innerHTML = '';
            if (channels.length === 0) {
                listContainer.innerHTML = '<p class="text-center">No se encontraron canales.</p>';
                return;
            }

            channels.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <span><strong>${ch.name}</strong></span>
                    <button class="btn-play">VER</button>
                `;
                card.onclick = () => window.open(ch.url, '_blank');
                listContainer.appendChild(card);
            });
        }

        // Buscador
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(term));
            displayChannels(filtered);
        });

        loadData();
    </script>
</body>
</html>
